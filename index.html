<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrimoriuM - D&D5.5 </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
   
</head>

<body class="bg-dark text-light">

<div class="container py-4">
    <h1 class="text-center mb-4">GrimoriouM</h1>

<div class="row g-3 mb-4 bg-secondary p-3 rounded align-items-center">
    <div class="col-md-4">
        <label class="form-label">BUSCAR</label>
        <input type="text" id="buscadorNombre" class="form-control" placeholder="Ej: Bola de fuego...">
    </div>
    
    <div class="col-md-8">
        <label class="form-label d-block">FILTRAR POR CLASE:</label>
        <div id="selectorClaseBotones" class="d-flex flex-wrap gap-2">
            <button class="btn btn-outline-light btn-clase active" data-clase="todos">Todos</button>
            <button class="btn btn-outline-light btn-clase" data-clase="Bardo">Bardo</button>
            <button class="btn btn-outline-light btn-clase" data-clase="Brujo">Brujo</button>
            <button class="btn btn-outline-light btn-clase" data-clase="Clérigo">Clérigo</button>
            <button class="btn btn-outline-light btn-clase" data-clase="Druida">Druida</button>
            <button class="btn btn-outline-light btn-clase" data-clase="Explorador">Explorador</button>
            <button class="btn btn-outline-light btn-clase" data-clase="Hechicero">Hechicero</button>
            <button class="btn btn-outline-light btn-clase" data-clase="Mago">Mago</button>
            <button class="btn btn-outline-light btn-clase" data-clase="Paladín">Paladín</button>
        </div>
    </div>

    <div class="col-12 mt-3">
        <div class="nivel-range-container">
            <label class="form-label d-flex justify-content-between">
                <span>RANGO DE NIVELES:</span>
                <span id="valorRango">0 - 9</span>
            </label>
            <div class="slider-wrapper">
                <div class="slider-track"></div>
                <input type="range" min="0" max="9" value="0" id="nivelMin" class="range-input">
                <input type="range" min="0" max="9" value="9" id="nivelMax" class="range-input">
            </div>
        </div>
    </div>
</div> <div class="row g-3 mb-4 bg-secondary p-3 rounded align-items-center">
    
    <div class="col-md-3">
        <label class="form-label mb-1">ORDENAR POR</label>
        <select id="ordenarPor" class="form-select">
            <option value="nombreAsc">Nombre (A-Z)</option>
            <option value="nombreDesc">Nombre (Z-A)</option>
            <option value="nivelAsc">Nivel (0 - 9)</option>
            <option value="nivelDesc">Nivel (9 - 0)</option>
        </select>
    </div>

    <div class="col-md-5 d-flex justify-content-center align-items-center gap-2">
        <div class="form-check form-switch pt-2 me-2">
            <input class="form-check-input" type="checkbox" id="filtroFavoritos">
            <label class="form-check-label" for="filtroFavoritos">Ver 📖</label>
        </div>
        <button id="btnCopiar" class="btn btn-outline-light btn-sm">Copiar 📖</button>
        <button id="btnVaciarPreparados" class="btn btn-outline-danger btn-sm">Vaciar 📖</button>
    </div>

    <div class="col-md-4 d-flex justify-content-end align-items-center gap-2">
        <span id="contador" class="badge p-2">Hechizos: 0</span>
        <button id="btnLimpiar" class="btn btn-outline-light btn-sm">Limpiar Filtros</button>
    </div>

</div> <div id="galeria" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
</div>

</div> <div id="galeria" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
    </div>
    <div class="text-center mt-5 mb-5">
        <button id="btnCargarMas" class="btn btn-primary btn-lg d-none">🎲 Cargar más hechizos 🎲</button>
    </div>

</div>

<script src="script.js"></script>

<div class="modal fade" id="modalHechizo" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark border-secondary">
      <div class="modal-body p-0 position-relative">
        <button type="button" class="btn btn-outline-light position-absolute top-50 start-0 translate-middle-y ms-2" onclick="anterior()" style="z-index: 1051;">&lt;</button>
        <button type="button" class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y me-2" onclick="siguiente()" style="z-index: 1051;">&gt;</button>
        
        <img id="imgModal" src="" class="img-fluid w-100 rounded" alt="Hechizo ampliado">
        
        <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
