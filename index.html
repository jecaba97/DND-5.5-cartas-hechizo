<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio - D&D5.5 </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
   
</head>

<body class="bg-dark text-light">

<div class="container py-4">
    <h1 class="text-center mb-4">Grimorio de Hechizos</h1>

<div class="row g-3 mb-4 bg-secondary p-3 rounded align-items-end">
    <div class="col-md-3">
        <label class="form-label">Buscar Hechizo</label>
        <input type="text" id="buscadorNombre" class="form-control" placeholder="Ej: Bola de fuego...">
    </div>
    
    <div class="col-md-2">
        <label class="form-label">Clase</label>
        <select id="filtroClase" class="form-select">
            <option value="todos">Todas</option>
            <option value="Bardo">Bardo</option>
            <option value="Brujo">Brujo</option>
            <option value="Clérigo">Clérigo</option>
            <option value="Druida">Druida</option>
            <option value="Explorador">Explorador</option>
            <option value="Hechicero">Hechicero</option>
            <option value="Mago">Mago</option>
            <option value="Paladín">Paladín</option>
        </select>
    </div>
    <div class="col-md-2">
        <label class="form-label">Nivel</label>
        <select id="filtroNivel" class="form-select">
            <option value="todos">Todos</option>
            <option value="0">Truco</option>
            <option value="1">Nivel 1</option>
            <option value="2">Nivel 2</option>
            <option value="3">Nivel 3</option>
            <option value="4">Nivel 4</option>
            <option value="5">Nivel 5</option>
            <option value="6">Nivel 6</option>
            <option value="7">Nivel 7</option>
            <option value="8">Nivel 8</option>
            <option value="9">Nivel 9</option>
            </select>
    </div>

<div class="col-md-2">
    <label class="form-label">Ordenar por</label>
    <select id="ordenarPor" class="form-select">
        <option value="nombreAsc">Nombre (A-Z)</option>
        <option value="nombreDesc">Nombre (Z-A)</option>
        <option value="nivelAsc">Nivel (0 - 9)</option>
        <option value="nivelDesc">Nivel (9 - 0)</option>
    </select>
</div>

    <div class="col-md-2">
    <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" id="filtroFavoritos">
        <label class="form-check-label" for="filtroFavoritos">Preparados 📖</label>
    </div>
</div>

    <div class="col-md-5 d-flex justify-content-between align-items-center">
        <div>
            <span id="contador" class="badge bg-info me-2">Hechizos: 0</span>
            <button id="btnLimpiar" class="btn btn-outline-light btn-sm">Limpiar</button>
        </div>
    </div>
</div>

    <div id="galeria" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
    </div>

    <div class="text-center mt-5 mb-5">
        <button id="btnCargarMas" class="btn btn-primary btn-lg d-none">Cargar más hechizos... 🎲</button>
    </div>


</div>

<script src="script.js"></script>

<div class="modal fade" id="modalHechizo" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark border-secondary">
      <div class="modal-body p-0 position-relative">
        <button type="button" class="btn btn-outline-light position-absolute top-50 start-0 translate-middle-y ms-2" onclick="anterior()" style="z-index: 1051;">&lt;</button>
        <button type="button" class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y me-2" onclick="siguiente()" style="z-index: 1051;">&gt;</button>
        
        <img id="imgModal" src="" class="img-fluid w-100 rounded" alt="Hechizo ampliado">
        
        <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
